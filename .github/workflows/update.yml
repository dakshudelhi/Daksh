name: Update KrishnaT Playlist

on:
  schedule:
    - cron: "30 2 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch Krishna Playlist
        run: |
          curl -f -L "https://stream.kliv.in/Jiotv+44/playlist.html" -o krishna9.m3u

          # 522 ya HTML error page detect karo
          if grep -qi "error code: 522" krishna9.m3u; then
            echo "Cloudflare 522 detected"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add krishna9.m3u

          git diff --staged --quiet || git commit -m "Update playlist $(date)"
          git push
